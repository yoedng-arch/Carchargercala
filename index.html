<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עלות טעינה EV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #0a0e27;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(135deg, #111829 0%, #1a1f3a 100%);
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(100, 255, 218, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #64ffda 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: #a0aec0;
        }

        .car-info {
            background: rgba(100, 255, 218, 0.05);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 28px;
            font-size: 12px;
            color: #cbd5e0;
            text-align: center;
        }

        .stage {
            display: none;
        }

        .stage.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-group input {
            flex: 1;
        }

        .input-group .unit {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(100, 255, 218, 0.3);
            border-radius: 10px;
            color: #f5f5f5;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            background: rgba(100, 255, 218, 0.1);
            border-color: #64ffda;
            box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.1);
        }

        input::placeholder {
            color: #718096;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64ffda 0%, #00f0ff 100%);
            color: #0a0e27;
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(100, 255, 218, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(100, 255, 218, 0.1);
            color: #64ffda;
            border: 1.5px solid rgba(100, 255, 218, 0.3);
        }

        .btn-secondary:active {
            background: rgba(100, 255, 218, 0.15);
        }

        .result {
            background: rgba(100, 255, 218, 0.08);
            border: 1.5px solid rgba(100, 255, 218, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }

        .result-label {
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #64ffda 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-currency {
            font-size: 16px;
        }

        .summary {
            background: rgba(100, 255, 218, 0.03);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #cbd5e0;
        }

        .summary-row:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 1px solid rgba(100, 255, 218, 0.1);
            color: #64ffda;
            font-weight: 600;
        }

        .emoji {
            font-size: 10px;
            margin-right: 4px;
        }

        @media (max-height: 700px) {
            .container {
                padding: 24px 20px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ עלות טעינה</h1>
            <p>Geely Geometry C 2024</p>
        </div>

        <div class="car-info">
            <span>🔋 סוללה: 70 kWh</span> •
            <span>💰 תעריף: ₪0.65/kWh</span>
        </div>

        <!-- Stage 1: Start Charging -->
        <div class="stage active" id="stage1">
            <h2 style="font-size: 16px; margin-bottom: 24px; color: #cbd5e0;">תחילת טעינה</h2>

            <div class="form-group">
                <label for="startBattery">סוללה</label>
                <div class="input-group">
                    <input type="number" id="startBattery" placeholder="0" min="0" max="100" step="1">
                    <div class="unit">%</div>
                </div>
            </div>

            <div class="form-group">
                <label for="startKm">קילומטרים נותרים</label>
                <div class="input-group">
                    <input type="number" id="startKm" placeholder="0" min="0" step="1">
                    <div class="unit">km</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="goToStage2()" id="nextBtn">המשך</button>
            </div>
        </div>

        <!-- Stage 2: End Charging -->
        <div class="stage" id="stage2">
            <h2 style="font-size: 16px; margin-bottom: 24px; color: #cbd5e0;">סוף טעינה</h2>

            <div class="form-group">
                <label for="endBattery">סוללה</label>
                <div class="input-group">
                    <input type="number" id="endBattery" placeholder="0" min="0" max="100" step="1">
                    <div class="unit">%</div>
                </div>
            </div>

            <div class="form-group">
                <label for="endKm">קילומטרים נותרים</label>
                <div class="input-group">
                    <input type="number" id="endKm" placeholder="0" min="0" step="1">
                    <div class="unit">km</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="goToStage1()">חזור</button>
                <button class="btn-primary" onclick="calculateCost()">חשב עלות</button>
            </div>
        </div>

        <!-- Stage 3: Result -->
        <div class="stage" id="stage3">
            <div class="result">
                <div class="result-label">עלות הטעינה</div>
                <div class="result-value"><span class="result-currency">₪</span><span id="costValue">0</span></div>
            </div>

            <div class="summary">
                <div class="summary-row">
                    <span><span class="emoji">🔋</span>סוללה</span>
                    <span id="summaryBattery">0% → 0%</span>
                </div>
                <div class="summary-row">
                    <span><span class="emoji">⚡</span>אנרגיה</span>
                    <span id="summaryEnergy">0 kWh</span>
                </div>
                <div class="summary-row">
                    <span><span class="emoji">🛣️</span>טווח</span>
                    <span id="summaryRange">0 km</span>
                </div>
                <div class="summary-row">
                    <span><span class="emoji">💳</span>סה״כ</span>
                    <span id="summaryCost">₪0.00</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="shareWhatsApp()" style="flex: 1;">שתף בWhatsApp</button>
                <button class="btn-primary" onclick="goToStage1()" style="flex: 1;">טעינה חדשה</button>
            </div>
        </div>
    </div>

    <script>
        const BATTERY_CAPACITY = 70;
        const COST_PER_KWH = 0.65;

        let data = {
            startBattery: 0,
            startKm: 0,
            endBattery: 0,
            endKm: 0,
            cost: 0,
            energy: 0
        };

        function goToStage(stageNum) {
            document.querySelectorAll('.stage').forEach(el => el.classList.remove('active'));
            document.getElementById(`stage${stageNum}`).classList.add('active');
        }

        function goToStage1() {
            goToStage(1);
            document.getElementById('startBattery').focus();
        }

        function goToStage2() {
            const start = parseInt(document.getElementById('startBattery').value) || 0;
            const km = parseInt(document.getElementById('startKm').value) || 0;

            if (start < 0 || start > 100) {
                alert('אנא הזן אחוז סוללה בין 0 ל-100');
                return;
            }

            data.startBattery = start;
            data.startKm = km;
            goToStage(2);
            document.getElementById('endBattery').focus();
        }

        function calculateCost() {
            const end = parseInt(document.getElementById('endBattery').value) || 0;
            const km = parseInt(document.getElementById('endKm').value) || 0;

            if (end < 0 || end > 100) {
                alert('אנא הזן אחוז סוללה בין 0 ל-100');
                return;
            }

            if (end <= data.startBattery) {
                alert('סוללה סופית חייבת להיות גבוהה מההתחלה');
                return;
            }

            data.endBattery = end;
            data.endKm = km;

            // Calculate energy and cost
            const percentageDiff = data.endBattery - data.startBattery;
            data.energy = (percentageDiff / 100) * BATTERY_CAPACITY;
            data.cost = data.energy * COST_PER_KWH;
            const rangeGain = km - data.startKm;

            // Update display
            document.getElementById('costValue').textContent = data.cost.toFixed(2);
            document.getElementById('summaryBattery').textContent =
                `${data.startBattery}% → ${data.endBattery}%`;
            document.getElementById('summaryEnergy').textContent =
                `${data.energy.toFixed(2)} kWh`;
            document.getElementById('summaryRange').textContent =
                `${Math.abs(rangeGain)} km`;
            document.getElementById('summaryCost').textContent =
                `₪${data.cost.toFixed(2)}`;

            goToStage(3);
        }

        function shareWhatsApp() {
            const rangeGain = Math.abs(data.endKm - data.startKm);
            const message = `⚡ עלות טעינה - Geely Geometry C\n\n` +
                `🔋 תחילה: ${data.startBattery}%\n` +
                `🔋 סוף: ${data.endBattery}%\n` +
                `⚡ אנרגיה: ${data.energy.toFixed(2)} kWh\n` +
                `🛣️ טווח: ${rangeGain} km\n\n` +
                `💰 עלות: ₪${data.cost.toFixed(2)}`;

            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // Allow Enter key to proceed
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const stage1 = document.getElementById('stage1');
                const stage2 = document.getElementById('stage2');

                if (stage1.classList.contains('active')) {
                    goToStage2();
                } else if (stage2.classList.contains('active')) {
                    calculateCost();
                }
            }
        });
    </script>
</body>
</html>
